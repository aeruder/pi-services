name: Build images
on: push

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: syncthing
      uses: redhat-actions/buildah-build@v2
      with:
        image: my-new-image
        tags: v1
        containerfiles: |
          ./syncthing/Dockerfile
